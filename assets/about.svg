<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="About Emmanuel Boakye">
  <defs><style>
  .hel { font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; }
  .mono { font-family:'SFMono-Regular',Consolas,'Liberation Mono',monospace; }
</style></defs>
  <rect width="1200" height="300" fill="#F4F2EE"/>
  <!-- vertical divider between the two columns -->
  <line x1="600" y1="20" x2="600" y2="280" stroke="#D8D4CC" stroke-width="1"/>
  <!-- LEFT: big pull quote, flush left -->
  <text x="60" y="30" class="mono" font-size="12" letter-spacing="3" fill="#FF4A1C">01 / WHO</text>
  <g class="hel" font-weight="700" fill="#1A1A1A" letter-spacing="-1.5">
    <text x="58" y="100" font-size="40">Insights from</text>
    <text x="58" y="148" font-size="40">messy data,</text>
    <text x="58" y="196" font-size="40">built to <tspan fill="#FF4A1C">explain</tspan></text>
    <text x="58" y="244" font-size="40">themselves.</text>
  </g>
  <!-- RIGHT: body copy, ragged right -->
  <text x="636" y="30" class="mono" font-size="12" letter-spacing="3" fill="#1A1A1A">02 / WHAT</text>
  <g class="hel" fill="#1A1A1A" font-size="17">
    <text x="636" y="92">Data Scientist and MSc graduate in Data</text>
    <text x="636" y="120">Science &amp; AI. I work across analytics,</text>
    <text x="636" y="148">machine learning, business intelligence,</text>
    <text x="636" y="176">and AI-powered automation.</text>
  </g>
  <g class="hel" fill="#6B6B6B" font-size="17">
    <text x="636" y="218">Predictive modeling and intelligent systems</text>
    <text x="636" y="246">that turn data into decisions across industries.</text>
  </g>
</svg>