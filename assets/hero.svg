<svg width="1200" height="520" viewBox="0 0 1200 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Emmanuel Boakye — Data Scientist">
  <defs>
    <style>
      .hel { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
      .mono { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', monospace; }
    </style>
  </defs>

  <!-- paper -->
  <rect width="1200" height="520" fill="#F4F2EE"/>

  <!-- ===== modular grid: 12 cols, margin 64, gutter — drawn as hairlines ===== -->
  <g stroke="#D8D4CC" stroke-width="1">
    <!-- top & bottom rules -->
    <line x1="64" y1="64" x2="1136" y2="64"/>
    <line x1="64" y1="456" x2="1136" y2="456"/>
    <!-- a couple structural verticals (asymmetric emphasis) -->
    <line x1="64" y1="64" x2="64" y2="456" stroke="#1A1A1A" stroke-width="2"/>
    <line x1="820" y1="64" x2="820" y2="456"/>
  </g>

  <!-- top metadata row -->
  <text x="64" y="52" class="mono" font-size="12" letter-spacing="3" fill="#1A1A1A">PORTFOLIO / 2026</text>
  <text x="1136" y="52" text-anchor="end" class="mono" font-size="12" letter-spacing="3" fill="#1A1A1A">ACCRA &#8594; LONDON</text>

  <!-- index number, oversized, spilling -->
  <text x="1150" y="250" text-anchor="end" class="hel" font-size="240" font-weight="700" fill="#FF4A1C" opacity="0.12" letter-spacing="-8">01</text>

  <!-- discipline label, vertical baseline left -->
  <text x="92" y="96" class="mono" font-size="13" letter-spacing="4" fill="#FF4A1C">DATA SCIENCE</text>

  <!-- MASSIVE NAME — the hero. flush left, tight leading, scale contrast -->
  <g class="hel" fill="#1A1A1A" font-weight="700" letter-spacing="-3">
    <text x="60" y="232" font-size="132">Emmanuel</text>
    <text x="60" y="356" font-size="132">Boakye<tspan fill="#FF4A1C">.</tspan></text>
  </g>

  <!-- role line, ragged right, set against the right column -->
  <g class="hel" fill="#1A1A1A">
    <text x="836" y="150" font-size="22" font-weight="500">Data Scientist</text>
    <text x="836" y="182" font-size="22" font-weight="500" fill="#6B6B6B">Machine Learning Engineer</text>
    <text x="836" y="214" font-size="22" font-weight="500" fill="#6B6B6B">AI Engineer</text>
  </g>

  <!-- short positioning statement, right col, ragged-right -->
  <g class="hel" fill="#3A3A3A" font-size="15">
    <text x="836" y="270">MSc Data Science &amp; AI. I build</text>
    <text x="836" y="292">explainable ML systems and turn</text>
    <text x="836" y="314">messy data into decisions.</text>
  </g>

  <!-- bottom baseline row: footer-style index -->
  <g class="mono" font-size="12" letter-spacing="2" fill="#1A1A1A">
    <text x="64" y="492">001 — INTRO</text>
    <text x="600" y="492" text-anchor="middle">EST. GHANA</text>
    <text x="1136" y="492" text-anchor="end">SCROLL &#8595;</text>
  </g>

  <!-- a single bold orange block, bottom-left, geometric anchor -->
  <rect x="64" y="420" width="120" height="10" fill="#FF4A1C"/>
</svg>
