<svg width="1200" height="150" viewBox="0 0 1200 150" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="About">
  <defs><style>
  .hel {{ font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; }}
  .mono {{ font-family:'SFMono-Regular',Consolas,'Liberation Mono',monospace; }}
</style></defs>
  <rect width="1200" height="150" fill="#F4F2EE"/>
  <!-- top hairline rule spanning grid -->
  <line x1="64" y1="40" x2="1136" y2="40" stroke="#1A1A1A" stroke-width="2"/>
  <!-- kicker on the rule, left -->
  <text x="64" y="32" class="mono" font-size="12" letter-spacing="3" fill="#FF4A1C">PROFILE</text>
  <!-- section number, right of rule -->
  <text x="1136" y="32" text-anchor="end" class="mono" font-size="12" letter-spacing="3" fill="#1A1A1A">SECTION / 02</text>
  <!-- giant title, flush left -->
  <text x="60" y="120" class="hel" font-size="64" font-weight="700" fill="#1A1A1A" letter-spacing="-2">About</text>
  <!-- big ghost number, right, spilling -->
  <text x="1140" y="140" text-anchor="end" class="hel" font-size="120" font-weight="700" fill="#FF4A1C" opacity="0.12" letter-spacing="-4">02</text>
</svg>